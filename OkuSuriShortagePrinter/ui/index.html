<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>おくすり不足 印刷アプリ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <img class="title-icon" src="icon.png" alt="" />
      <h1>おくすり不足 印刷アプリ <span class="title-version">version2</span></h1>
      <button id="btnSettings" class="btn header-settings-btn" type="button" aria-label="設定">
        <span class="header-settings-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
      </button>
    </header>

    <main class="main">
      <section class="editor-card">
        <div id="accordion" class="accordion">
          <section class="qa-item" data-step="0">
            <button class="qa-summary" type="button" data-open-step="0">
              <span class="summary-label">患者氏名</span>
              <span id="summaryPatient" class="summary-value empty">未入力</span>
            </button>
            <div class="qa-panel">
              <label for="patient" class="question">患者氏名は？</label>
              <input id="patient" type="text" autocomplete="off" placeholder="例：〇〇 太郎" />
              <div class="panel-actions"><button class="btn next" type="button" data-next-step="1">次へ</button></div>
            </div>
          </section>

          <section class="drug-block" aria-label="不足薬品入力">
            <div id="drugTabs" class="drug-tabs" role="tablist" aria-label="不足薬品タブ"></div>
            <div class="drug-frame">
              <section class="qa-item" data-step="1">
                <button class="qa-summary" type="button" data-open-step="1">
                  <span class="summary-label">薬品名</span>
                  <span id="summaryDrug" class="summary-value empty">未入力</span>
                </button>
                <div class="qa-panel">
                  <label for="drug" class="question">不足した薬品名は？</label>
                  <input id="drug" type="text" autocomplete="off" placeholder="例：アムロジピンOD錠5mg「サワイ」" />
                  <div class="drug-type-row" role="group" aria-label="薬品区分">
                    <button id="drugTypePack" class="btn toggle-btn" type="button" data-drug-type="pack" aria-pressed="false">一包化に入ってる場合</button>
                    <button id="drugTypePowder" class="btn toggle-btn" type="button" data-drug-type="powder" aria-pressed="false">他の粉と混合の場合</button>
                    <button id="drugTypeMixedOintment" class="btn toggle-btn" type="button" data-drug-type="mixedOintment" aria-pressed="false">混合軟膏の場合</button>
                    <button id="drugTypeMixedSyrup" class="btn toggle-btn" type="button" data-drug-type="mixedSyrup" aria-pressed="false">混合シロップの場合</button>
                  </div>
                  <div id="drugUsageWrap" class="drug-usage-row" hidden>
                    <label id="drugUsageQuestion" for="drugUsage" class="question">不足で渡す混合シロップの用法は？</label>
                    <input id="drugUsage" type="text" autocomplete="off" placeholder="例：朝、昼、寝る前" />
                  </div>
                  <div class="panel-actions">
                    <button class="btn prev" type="button" data-prev-step="0">前へ</button>
                    <button class="btn next" type="button" data-next-step="2">次へ</button>
                  </div>
                </div>
              </section>

              <section class="qa-item" data-step="2">
                <button class="qa-summary" type="button" data-open-step="2">
                  <span class="summary-label">お渡し数</span>
                  <span id="summaryShortage" class="summary-value empty">未入力</span>
                </button>
                <div class="qa-panel">
                  <div id="shortageQuestion" class="question">◯◯（薬品名）をお渡しできる数は？</div>
                  <div class="shortage-grid">
                    <label class="mini-field">
                      <span>お渡しできる数</span>
                      <input id="shortageCount" type="number" min="0" step="1" autocomplete="off" />
                    </label>
                    <label class="mini-field">
                      <span>全体数</span>
                      <input id="shortageDays" type="number" min="0" step="1" autocomplete="off" />
                    </label>
                    <label class="mini-field">
                      <span>単位</span>
                      <select id="shortageUnit">
                        <option value="日分">日分</option>
                        <option value="錠">錠</option>
                        <option value="包">包</option>
                        <option value="本">本</option>
                        <option value="個">個</option>
                        <option value="g">g</option>
                        <option value="mL">mL</option>
                        <option value="その他">その他</option>
                      </select>
                    </label>
                    <label id="unitOtherWrap" class="mini-field" hidden>
                      <span>その他単位</span>
                      <input id="shortageUnitOther" type="text" autocomplete="off" />
                    </label>
                  </div>
                  <div class="panel-actions">
                    <button class="btn prev" type="button" data-prev-step="1">前へ</button>
                    <button class="btn next" type="button" data-next-step="3">次へ</button>
                  </div>
                </div>
              </section>

              <section class="qa-item" data-step="3">
                <button class="qa-summary" type="button" data-open-step="3">
                  <span class="summary-label">入荷予定</span>
                  <span id="summaryArrive" class="summary-value empty">未入力</span>
                </button>
                <div class="qa-panel">
                  <div id="arrivalQuestion" class="question">◯◯（薬品名）の入荷予定日時は？</div>
                  <div class="choices">
                    <label><input type="radio" name="arrive" value="arriveUndecided" checked /> 未定</label>
                    <label><input type="radio" name="arrive" value="arriveTodayPm" /> 本日の午後</label>
                    <label><input type="radio" name="arrive" value="arriveTomorrowAm" /> 明日の朝</label>
                    <label><input type="radio" name="arrive" value="arriveWeekdayAm" /> <span id="arriveWeekdayAmLabel">◯曜日の朝</span></label>
                    <label><input type="radio" name="arrive" value="arriveWeekdayNextAm" /> <span id="arriveWeekdayNextAmLabel">◯曜日の朝</span></label>
                    <label><input type="radio" name="arrive" value="arriveOther" /> その他</label>
                  </div>
                  <div id="arriveOtherRow" class="sub-input-row" hidden>
                    <input id="arriveOtherText" class="sub-input" type="text" placeholder="自由入力 またはカレンダーから選択" />
                    <button id="arriveOtherDateBtn" class="sub-input-calendar-btn" type="button" aria-label="日付を選択">📅</button>
                    <input id="arriveOtherDatePicker" class="date-picker-proxy" type="date" tabindex="-1" aria-hidden="true" />
                  </div>
                  <div class="panel-actions">
                    <button class="btn prev" type="button" data-prev-step="2">前へ</button>
                    <button class="btn next" type="button" data-next-step="4">次へ</button>
                  </div>
                </div>
              </section>

              <section class="qa-item" data-step="4">
                <button class="qa-summary" type="button" data-open-step="4">
                  <span class="summary-label">入荷先</span>
                  <span id="summaryDest" class="summary-value empty">未入力</span>
                </button>
                <div class="qa-panel">
                  <div id="destinationQuestion" class="question">◯◯（薬品名）の入荷先は？</div>
                  <div id="destinationChoices" class="choices"></div>
                  <input id="destSmallText" class="sub-input" type="text" placeholder="小分け内容を入力" hidden />
                  <input id="destOtherText" class="sub-input" type="text" placeholder="入荷先を入力" hidden />
                  <div class="panel-actions">
                    <button class="btn prev" type="button" data-prev-step="3">前へ</button>
                    <button class="btn next" type="button" data-next-step="5">次へ</button>
                  </div>
                </div>
              </section>

              <section class="qa-item" data-step="5">
                <button class="qa-summary" type="button" data-open-step="5">
                  <span class="summary-label">備考</span>
                  <span id="summaryNotes" class="summary-value empty">未入力</span>
                </button>
                <div class="qa-panel">
                  <label for="notes" class="question">備考</label>
                  <textarea id="notes" rows="3" placeholder="必要があれば入力"></textarea>
                  <div class="panel-actions">
                    <button class="btn prev" type="button" data-prev-step="4">前へ</button>
                  </div>
                </div>
              </section>
            </div>
          </section>
        </div>
      </section>
    </main>

    <footer class="actions">
      <button id="btnPreview" class="btn primary" type="button">印刷プレビュー</button>
      <div id="btnPrintWrap" class="print-btn-wrap">
        <button id="btnPrint" class="btn accent" type="button">印刷
          <span class="print-ready-tip-bubble" aria-hidden="true">
            <svg class="tip-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              <path d="M8 1.5H92A6.5 6.5 0 0 1 98.5 8V79.5A6.5 6.5 0 0 1 92 86H56L50 98.5L44 86H8A6.5 6.5 0 0 1 1.5 79.5V8A6.5 6.5 0 0 1 8 1.5Z" fill="#d47a00"></path>
              <path d="M8 1.5H92A6.5 6.5 0 0 1 98.5 8V79.5A6.5 6.5 0 0 1 92 86H56L50 98.5L44 86H8A6.5 6.5 0 0 1 1.5 79.5V8A6.5 6.5 0 0 1 8 1.5Z" fill="none" stroke="#efc48f" stroke-width="3" vector-effect="non-scaling-stroke" stroke-linejoin="round"></path>
            </svg>
            <span class="tip-text">準備ができたら、入力内容が正しいか
　再確認してから印刷してください</span>
          </span>
        </button>
        <span id="printMissingTip" class="print-missing-tip-bubble" aria-hidden="true">
          <svg class="tip-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
            <path d="M8 1.5H92A6.5 6.5 0 0 1 98.5 8V79.5A6.5 6.5 0 0 1 92 86H56L50 98.5L44 86H8A6.5 6.5 0 0 1 1.5 79.5V8A6.5 6.5 0 0 1 8 1.5Z" fill="#cf2f4c"></path>
            <path d="M8 1.5H92A6.5 6.5 0 0 1 98.5 8V79.5A6.5 6.5 0 0 1 92 86H56L50 98.5L44 86H8A6.5 6.5 0 0 1 1.5 79.5V8A6.5 6.5 0 0 1 8 1.5Z" fill="none" stroke="#efb4bc" stroke-width="3" vector-effect="non-scaling-stroke" stroke-linejoin="round"></path>
          </svg>
          <span class="tip-text">必須項目が未記入です</span>
        </span>
      </div>
      <button id="btnClear" class="btn" type="button">入力をクリア</button>
      <div id="missingWarn" class="warn" hidden>必須項目（患者氏名・各不足薬品の薬品名・お渡し数/全体数）を入力してください。</div>
    </footer>
  </div>

  <div id="busyOverlay" class="busy-overlay" hidden>印刷中...</div>

  <div id="settingsModal" class="settings-modal" hidden>
    <div class="settings-card" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="settings-header">
        <div id="settingsTitle" class="settings-title">設定</div>
        <button id="btnSettingsClose" class="btn" type="button">閉じる</button>
      </div>
      <div class="settings-body">
        <div class="settings-item">
          <label for="printerName" class="settings-label">印刷プリンタ</label>
          <select id="printerName" class="mono printer-select" aria-label="プリンタ選択"></select>
        </div>
        <div class="settings-item">
          <label for="startupWindowScale" class="settings-label">起動時ウィンドウサイズ</label>
          <div class="settings-range-row">
            <input id="startupWindowScale" type="range" min="75" max="150" step="1" />
            <span id="startupWindowScaleValue" class="settings-value">100%</span>
          </div>
        </div>
        <div class="settings-item">
          <label for="uiScale" class="settings-label">UIサイズ</label>
          <div class="settings-range-row">
            <input id="uiScale" type="range" min="75" max="150" step="1" />
            <span id="uiScaleValue" class="settings-value">100%</span>
          </div>
        </div>
        <div class="settings-item">
          <label for="page1YellowFrameThickness" class="settings-label">1ページ目 黄色枠の太さ</label>
          <div class="settings-range-row">
            <input id="page1YellowFrameThickness" type="range" min="30" max="120" step="1" />
            <span id="page1YellowFrameThicknessValue" class="settings-value">3.0 mm</span>
          </div>
        </div>
        <div class="settings-item">
          <label for="wholesalerList" class="settings-label">問屋リスト（/区切り）</label>
          <input id="wholesalerList" type="text" placeholder="例：メディセオ/スズケン/バイタル/アルフレッサ" />
        </div>
      </div>
    </div>
  </div>

  <div id="previewModal" class="preview-modal" hidden>
    <div class="preview-header">
      <div id="previewTitle" class="preview-title">印刷プレビュー（A4）</div>
      <div class="preview-actions">
        <div id="btnPreviewPrintWrap" class="preview-print-btn-wrap">
          <button id="btnPreviewPrint" class="btn accent" type="button" disabled>印刷</button>
          <span id="previewPrintMissingTip" class="print-missing-tip-bubble" aria-hidden="true">
            <svg class="tip-svg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
              <path d="M8 1.5H92A6.5 6.5 0 0 1 98.5 8V79.5A6.5 6.5 0 0 1 92 86H56L50 98.5L44 86H8A6.5 6.5 0 0 1 1.5 79.5V8A6.5 6.5 0 0 1 8 1.5Z" fill="#cf2f4c"></path>
              <path d="M8 1.5H92A6.5 6.5 0 0 1 98.5 8V79.5A6.5 6.5 0 0 1 92 86H56L50 98.5L44 86H8A6.5 6.5 0 0 1 1.5 79.5V8A6.5 6.5 0 0 1 8 1.5Z" fill="none" stroke="#efb4bc" stroke-width="3" vector-effect="non-scaling-stroke" stroke-linejoin="round"></path>
            </svg>
            <span class="tip-text">必須項目が未記入です</span>
          </span>
        </div>
        <button id="btnPreviewClose" class="btn" type="button">閉じる</button>
      </div>
    </div>
    <div class="preview-body">
      <iframe id="previewFrame" title="印刷プレビュー"></iframe>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <div id="error" class="error"></div>

  <script src="app.js"></script>
</body>
</html>
